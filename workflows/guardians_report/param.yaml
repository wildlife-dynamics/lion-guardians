workflow_details:
  description: ''
  name: sample_guardians_report
time_range:
  timezone:
    label: UTC
    tzCode: UTC
    name: UTC
    utc: '+03:00'
  time_format: '%d %b %Y %H:%M:%S'
  since: '2026-02-19T21:00:00.000Z'
  until: '2026-02-22T21:00:00.000Z'
groupers:
  groupers: []
er_client_name:
  data_source:
    name: lg
base_map_defs:
  base_maps:
    - url: >-
        https://server.arcgisonline.com/arcgis/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}
      opacity: 1
      max_zoom: 20
    - url: >-
        https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}
      opacity: 0.15
      max_zoom: 20
er_patrol_and_events_params:
  patrol_types: []
  event_types: []
  status:
    - done
  include_null_geometry: true
patrol_traj:
  trajectory_segment_filter:
    min_length_meters: 0.001
    max_length_meters: 5000
    min_time_secs: 1
    max_time_secs: 21600
    min_speed_kmhr: 0.01
    max_speed_kmhr: 25
filter_patrol_events:
  bounding_box:
    min_y: -90
    max_y: 90
    min_x: -180
    max_x: 180
  filter_point_coords: []
  reset_index: true
ltd_meshgrid:
  auto_scale_or_custom_cell_size:
    auto_scale_or_custom: Auto-scale
  crs: EPSG:3857
set_patrol_traj_color_column:
  var: patrol_type
patrol_events_bar_chart:
  time_interval: day
